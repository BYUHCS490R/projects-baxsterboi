        <main>
            <h2>Different types of Volleyball</h2>

            <article>
                <figure>
                    <img src="Youth.jpg" alt="Indoor Volley">
                    <figcaption><strong><a href="https://ymcafw.org/youth-sports/volleyball/">Indoor</a> Volleyball</strong></figcaption>
                    <p>This is a common volleyball style people are playing nowadays. Indoor volleyball required team to have 6 players. Indoor volleyball is the most fast-paced volleyball games, It required player to be alert and great teamwork. The net height for indoor volleyball is 2.43 m which is quite tall.</p>
                </figure>
            </article>


            <article>
                <figure>
                    <img src="sit.jpg" alt="Sitting Volley">
                    <figcaption><strong><a href="https://www.ottobock.com/en-ca/resources/active-living-and-sports/team-sports">Sitting</a>Volleyball</strong></figcaption>
                    <p>Sitting volleyball is a famous sport in Paralympic sport. This sport is exclusively for individuals with physical impairments. The rules of sitting Volleyball are similar to indoor volleyball except for net height and ball size. The invention of this type of volleyball helps individuals with physical impairments to reintergate into sport.</p>
                </figure>
            </article>

            <article>
                <figure>
                <img src="men.jpg" alt="Beach Volleyball">
                <figcaption><strong><a href="https://www.pexels.com/photo/beach-volleyball-game-with-two-young-adults-34557904/">Beach</a> Volleyball</strong></figcaption>
                <p>This is one of the hardest Volleyball game. It required player to play 2v2 against each other. This sport required immense stamina in order to move fast and quick on the sand. </p>
                </figure>
            </article>
