<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="forms.css">
</head>
<body>
    <header>
        <h1>Baxster's forms</h1>
    </header>
    <main>
        <div id="message"></div>
        <form id="myForm"action="formprocs.html" method="post">
            <fieldset>
                <legend>Main Information</legend>
                    <div class="form-row">
                        <label for="fname">Name:</label>
                        <input type="text" name="fullname" id="fullname">
                    </div>
                    <div class="form-row">
                        <label for="email">Email:</label>
                        <input type="text" name="email" id="email">
                    </div>
                    <div class="form-row">
                        <label for="dateInput">Birthdate:</label>
                        <input type="date" name="birthdate" id="age">
                    </div>
                    <div class="form-row">
                        <label for="password">Password:</label>
                        <input type="password" name="pass" id="pass">
                    </div>
            </fieldset>

            <fieldset>
                <legend>Sign Up Information</legend>
                    <div class="form-row">
                        <label>Gender:</label>
                            <div class="radio">
                                <input type="radio" id="male" name="gender" value="male">
                                <label for="male">Male</label>

                                <input type="radio" id="female" name="gender" value="female">
                                <label for="female">Female</label>
                            </div>
                    </div>
                    <div class="form-row">
                        <label for="state">State:</label>
                             <select name="state" id="state">
                                 <option value="blank">......</option>
                                 <option value="CA">california</option>
                                 <option value="AZ">Arizona</option>
                                <option value="UT">Utah</option>
                            </select>
                    </div>
                    <div class="form-row">
                        <label for="phone">Phone Number:</label>
                        <input type="tel" id="phone" name="phone">
                    </div>
                    <div class="form-row">
                        <label></label>
                            <div class="checkbox">
                                <input type="checkbox" id="agree">
                                <label for="agree">I agree to the term</label>
                            </div>
                    </div>
                     <div class="form-row">
                        <label for="comments">Comments:</label>
                        <textarea name="comments" id="comments"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="spacer"></div>
                        <input type="submit" value="sign up">
                    </div>
            </fieldset>

        </form>
    </main>
    <footer>
       <p>&copy;Baxster Jimmy 2026</p> 
    </footer>
    <script>
        document.getElementById("myForm").addEventListener("submit",function(event) {
            event.preventDefault();
            //alert("Form Submitted");

            const fullname = document.getElementById("fullname").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("pass").value;
            const age = document.getElementById("age").value;

            if (!fullname || !email || !password) {
                alert("You need a name, email and Password.");
                return;
            }

            const ageValue = parseInt(age);
            if (isNaN(ageValue) || ageValue < 18) {
                alert("You need to be 18.");
                return;
            }

            const formDate = {
                name: fullname,
                email: email,
                password: password,
                age: age,
            };

            console.log(formDate);
            const xhr = new XMLHttpRequest();
            xhr.open("GET", "submit.json", true);
            xhr.setRequestHeader("Content-Type", "application/json;charset=UTF-8");
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    alert("Form submitted successfully!");
                    const response = JSON.parse(xhr.responseText);
                    console.log(response);
                    //document.getElementById('myForm').reset();
                    document.getElementById('myForm').innerHTML = '';
                    document.getElementById('message').innerText = response.message;
                } else if (xhr.readyState === 4) {
                    alert("Error submitting form.");
                }
            };
            xhr.send(JSON.stringify(formDate));
        });
        
    </script>
</body>
</html>
